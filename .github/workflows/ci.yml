name: CI

on:
  push:
    branches: [main, '**']
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild build \
            -scheme showcase \
            -destination 'generic/platform=iOS Simulator' \
            -quiet

      - name: Test
        run: ./scripts/run-package-tests.sh

      - name: Validate SPM packages
        run: ./scripts/validate-packages.sh
